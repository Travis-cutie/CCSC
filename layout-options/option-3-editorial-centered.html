<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alhambra — Option 3: Editorial Centered</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
  nav { background: #fff; pointer-events: all; border-bottom: none !important; }
  nav.scrolled { background: rgba(250,249,247,0.96); padding: 28px 40px; border-bottom: 1px solid #e8e8e8 !important; }
  .nav-links a { color: var(--mid); }
  .nav-links a.active { color: var(--ink); }
  body { padding-top: 75px; background: #fff; }

  .opt-tag { position: fixed; top: 14px; right: 14px; z-index: 999; background: #1a1a1a; color: #fff; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 6px 12px; border-radius: 20px; }

  .ed-strip { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; aspect-ratio: 16/3.2; max-height: 190px; }
  .ed-strip img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .ed-wrap { max-width: 560px; margin: 0 auto; padding: 64px 24px 80px; text-align: center; }
  .ed-eyebrow { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--mid); margin-bottom: 18px; }
  .ed-eyebrow a { color: var(--mid); text-decoration: none; }
  .ed-title { font-family: 'Sentient', serif; font-weight: 300; font-size: clamp(44px, 6vw, 68px); letter-spacing: -0.02em; color: var(--ink); margin-bottom: 36px; }

  .ed-ticket { border: 1px dashed #ddd; padding: 32px 40px; margin-bottom: 36px; }
  .ed-ticket-row { display: flex; justify-content: space-between; padding: 10px 0; font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em; }
  .ed-ticket-row + .ed-ticket-row { border-top: 1px dashed #eee; }
  .ed-ticket-label { color: var(--mid); text-transform: uppercase; letter-spacing: 0.14em; font-size: 10px; }
  .ed-ticket-value { color: var(--ink); text-align: right; }
  .ed-ticket-value a { color: var(--ink); text-decoration: none; }

  .ed-btn-row { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 40px; }
  .ed-btn {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink); text-decoration: none;
  }
  .ed-btn .arrow-circle {
    width: 36px; height: 36px; background: var(--accent); border: 1px solid var(--accent); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff;
  }
  .ed-social { display: flex; justify-content: center; gap: 10px; margin-bottom: 36px; }
  .ed-social a { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; color: var(--ink); }
  .ed-back a { font-family: var(--mono); font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mid); text-decoration: none; }
</style>
</head>
<body>
<div class="opt-tag">Option 3 — Editorial, centered</div>

<nav id="mainNav">

    <a href="../locations.html" class="active">Locations</a>

    <a href="#">Franchise</a>

</nav>

<div class="ed-strip">

</div>

      <span class="ed-ticket-label">Address</span>

    </div>

      <span class="ed-ticket-label">Phone</span>
      <span class="ed-ticket-value"><a href="tel:+16264271166">(626) 427-1166</a></span>
    </div>

      <span class="ed-ticket-label">Sat–Sun</span>

  </div>

  <div class="ed-btn-row">

    <a href="https://maps.google.com/?q=30+W+Main+St+Alhambra+CA+91801" target="_blank" class="ed-btn"><span class="arrow-circle">→</span>Get Directions</a>
  </div>

  <div class="ed-social">
    <a href="#" aria-label="Website"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.4 2.5 3.8 5.6 3.8 9s-1.4 6.5-3.8 9c-2.4-2.5-3.8-5.6-3.8-9s1.4-6.5 3.8-9z"/></svg></a>
    <a href="#" aria-label="Instagram"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.3" cy="6.7" r="1"/></svg></a>
  </div>

  <div class="ed-back"><a href="../locations.html">← Back to all locations</a></div>
</div>

</body>
</html>
